<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - المكتبة الرقمية</title>
    <style>
        /* تنسيقات بسيطة لضمان ظهور الإطار بشكل أنيق */
        .drive-container {
            width: 100%;
            height: 450px;
            border: 2px dashed #2a5298;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 15px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <script>
        function getSmartLocalResponse(prompt) {
            // تنظيف النص وتحويله لمعالجة دقيقة
            const query = prompt.trim().toLowerCase();

            // رابط مجلد Google Drive السحابي الخاص بك
            const googleDriveUrl = "https://google.com";

            // 1. إذا طلب المستخدم تحميلاً، كتباً، أو ملفات (تفتح نافذة العرض التلقائية لكل ملفاتك الـ 4)
            if (query.includes('تحميل') || query.includes('كتاب') || query.includes('مقالة') || query.includes('مقال') || query.includes('ملف') || query.includes('أريد') || query.includes('أثر')) {
                return "بالتأكيد! لتصفح وتحميل جميع الكتب والمقالات العلمية (بما فيها بحث <b>أثر تصميم روبوتات الدردشة التفاعلية في بيئة المحفزات</b> والملفات الأخرى)، يمكنك استخدام مركز التحميل السحابي المباشر المدمج أدناه، أو الضغط على زر الفتح المباشر:<br><br>" +
                       `<a href="${googleDriveUrl}" target="_blank" style="color: #fff; background: #2a5298; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; font-weight: bold; margin-bottom: 10px;">📂 فتح المجلد في نافذة خارجية</a>` +
                       `<div class="drive-container"><iframe src="https://google.com"></iframe></div>`;
            }

            // 2. قسم الشروحات العلمية والترحيب
            if (query.includes('مرحبا') || query.includes('أهلا') || query.includes('سلام')) {
                return "مرحباً بك في المكتبة الرقمية الذكية! أنا مساعدك الذكي الجاهز للإجابة على أسئلتك العلمية أو توجيهك لمركز تحميل الملفات. ماذا تحتاج اليوم؟";
            }
            if (query.includes('ديوي') || query.includes('تصنيف')) {
                return "<b>تصنيف ديوي العشري (DDC):</b> هو نظام لتصنيف محتويات المكتبات وضعه ميلفيل ديوي عام 1876. يعتمد النظام على تقسيم المعرفة البشرية إلى 10 أصول رئيسية (من 000 إلى 900).";
            }
            if (query.includes('فهرسة') || query.includes('الفهرس')) {
                return "<b>الفهرسة الإلكترونية:</b> هي عملية الوصف الفني والموضوعي لمصادر المعلومات باستخدام الحاسب الآلي، لإنتاج فهارس متاحة عبر الإنترنت تسهل الوصول للكتب بسرعة.";
            }
            if (query.includes('ذكاء') || query.includes('تعليم') || query.includes('روبوت')) {
                return "<b>الذكاء الاصطناعي وروبوتات الدردشة في التعليم:</b> يساهم في تخصيص التعلم للطلاب، وأتمتة عمليات التصنيف في المكتبات، وتوفير بيئة تفاعلية محفزة للتعلم والتصفح الموضوعي.";
            }
            
            return "شكرًا لسؤالك. يمكنك سؤالي عن المفاهيم العلمية (مثل تصنيف ديوي أو الفهرسة)، أو كتابة كلمة 'تحميل' أو اسم بحثك ليظهر لك مركز الوصول الفوري لكافة ملفات المكتبة المرفوعة.";
        }
    </script>
</body>
</html>
