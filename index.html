<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة التميز الرقمية</title>
    <style>
        /* كود التصميم النظيف والجديد لضمان اختفاء الدائرة الزرقاء */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #1e3c72;
            margin-bottom: 20px;
        }
        /* تصميم صندوق المحادثة الأنيق */
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #e1e8ed;
        }
        .chat-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .chat-box {
            height: 300px;
            padding: 15px;
            overflow-y: auto;
            background: #fcfdfe;
            border-bottom: 1px solid #eee;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.5;
            max-width: 85%;
            font-size: 14px;
        }
        .bot-message {
            background: #f0f4f8;
            color: #333;
            margin-left: auto;
            border-right: 4px solid #2a5298;
        }
        .user-message {
            background: #2a5298;
            color: white;
            margin-right: auto;
            text-align: right;
            border-left: 4px solid #1e3c72;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #fff;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }
        .input-area button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 0 18px;
            margin-right: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .input-area button:hover {
            background: #1e3c72;
        }
    </style>
</head>
<body>

    <h2>📚 موقع المكتبة الرقمية الذكية</h2>

    <!-- واجهة المحادثة المرئية للروبوت -->
    <div class="chat-container">
        <div class="chat-header">💬 المساعد الذكي للمكتبة</div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                مرحباً بك! أنا مساعدك الرقمي التفاعلي. 
                <br>يمكنك الاستفسار عن المفاهيم العلمية أو كتابة كلمة <b>"تحميل"</b> لتصفح وتنزيل كافة المراجع المتاحة.
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك أو كلمة 'تحميل' هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const inputField = document.getElementById('userInput');
            const messageText = inputField.value.trim();
            if (messageText === '') return;

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="message user-message">${messageText}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                const botResponse = getSmartLocalResponse(messageText);
                chatBox.innerHTML += `<div class="message bot-message">${botResponse}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 400);
        }

        // عقل ومنطق المساعد الرقمي الصحيح والنظيف
        function getSmartLocalResponse(prompt) {
            const query = prompt.toLowerCase();

            if (query.includes('تحميل') || query.includes('كتاب') || query.includes('مقالة') || query.includes('مقال') || query.includes('ملف') || query.includes('أريد') || query.includes('أثر') || query.includes('روبوتات')) {
                return "بالتأكيد! لتصفح وتحميل جميع المراجع والكتب العلمية المتاحة بمشروعنا (بما فيها بحث <b>أثر تصميم روبوتات الدردشة التفاعلية في بيئة المحفزات</b>)، يرجى الضغط على الرابط المباشر التالي للتحميل السحابي السريع:<br><br>" +
                       `<a href="https://google.com" target="_blank" style="color: #fff; background: #28a745; padding: 8px 16px; border-radius: 5px; text-decoration: none; display: inline-block; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.15); font-size: 13px;">📂 اضغط هنا لفتح مجلد التحميل المباشر</a>`;
            }

            if (query.includes('مرحبا') || query.includes('أهلا') || query.includes('سلام')) {
                return "مرحباً بك في المكتبة الرقمية الذكية! أنا مساعدك الذكي الجاهز للإجابة على أسئلتك العلمية أو توجيهك لمركز تحميل الملفات. ماذا تحتاج اليوم؟";
            }
            if (query.includes('ديوي') || query.includes('تصنيف')) {
                return "<b>تصنيف ديوي العشري (DDC):</b> هو نظام لتصنيف محتويات المكتبات وضعه ميلفيل ديوي عام 1876. يعتمد النظام على تقسيم المعرفة البشرية إلى 10 أصول رئيسية (من 000 إلى 900).";
            }
            if (query.includes('فهرسة') || query.includes('الفهرس')) {
                return "<b>الفهرسة الإلكترونية:</b> هي عملية الوصف الفني والموضوعي لمصادر المعلومات باستخدام الحاسب الآلي، لإنتاج فهارس متاحة عبر الإنترنت تسهل الوصول للكتب بسرعة.";
            }
            if (query.includes('ذكاء') || query.includes('تعليم')) {
                return "<b>الذكاء الاصطناعي في التعليم والمكتبات:</b> يساهم في تخصيص التعلم للطلاب، وفي المكتبات يساعد في أتمتة عمليات التصنيف، وتحسين محركات البحث الموضوعي.";
            }
            if (query.includes('روبوت') || query.includes('دردشة')) {
                return "<b>روبوتات الدردشة في المكتبات:</b> هي واجهات تفاعلية ذكية تُبنى لتسهيل التواصل مع الباحثين، والإجابة الفورية على استفساراتهم، وإرشادهم لمصادر المعلومات المتاحة بالمكتبة بدقة وسرعة.";
            }
            
            return "شكرًا لسؤالك المهم. بصفتي المساعد الذكي، يمكنني شرح المفاهيم العلمية أو تزويدك بروابط تحميل أي كتاب، اكتب كلمة 'تحميل' لأعطيك رابط الوصول الفوري لكافة ملفات وكتب المكتبة.";
        }
    </script>
</body>
</html>
